    ];

    // 分页配置
    const ITEMS_PER_PAGE = 5;      // 每页显示5篇文章
    let currentPage = 1;
    const totalPages = Math.ceil(articlesData.length / ITEMS_PER_PAGE);

    // 渲染当前页文章
    function renderArticles() {
        const start = (currentPage - 1) * ITEMS_PER_PAGE;
        const end = start + ITEMS_PER_PAGE;
        const pageArticles = articlesData.slice(start, end);
        
        const grid = document.getElementById('articlesGrid');
        if (!grid) return;
        
        grid.innerHTML = pageArticles.map(article => `
            <div class="card">
                <div class="card-img" style="background-image: url('${article.img}');"></div>
                <div class="card-content">
                    <div class="card-title">${article.title}</div>
                    <div class="card-meta">📅 ${article.date} | 🔥 ${article.views}阅读</div>
                    <div class="card-excerpt">${article.excerpt}</div>
                    <a href="${article.link}" class="read-more">阅读全文 →</a>
                </div>
            </div>
        `).join('');
    }

    // 渲染分页控件
    function renderPagination() {
        const container = document.getElementById('paginationControls');
        if (!container) return;
        
        container.innerHTML = `
            <button id="prevPage" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>
            <span>第 ${currentPage} / ${totalPages} 页</span>
            <button id="nextPage" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>
        `;
        
        const prevBtn = document.getElementById('prevPage');
        const nextBtn = document.getElementById('nextPage');
        if (prevBtn) prevBtn.addEventListener('click', () => changePage(currentPage - 1));
        if (nextBtn) nextBtn.addEventListener('click', () => changePage(currentPage + 1));
    }
    
    function changePage(page) {
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        renderArticles();
        renderPagination();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 初始化页面
    function init() {
        renderArticles();
        renderPagination();
    }
    init();

    // ========== 禁止图片右键菜单 ==========
    document.addEventListener('contextmenu', function(e) {
        if (e.target.tagName === 'IMG') {
            e.preventDefault();
            return false;
        }
    });
